
title = "Garys site"
baseURL = "https://hugo-gary-quickstart.netlify.app"
theme = ["github.com/theNewDynamic/gohugo-theme-ananke/v2"]
resourceDir = "../resources"
defaultContentLanguage = "en"
sectionPagesMenu = "main"
enableRobotsTXT = true

[services.googleAnalytics]
id = ''

[pagination]
pagerSize = 3 # this is set low for demonstrating with dummy content. Set to a higher number

[languages.en]
contentDir = "content/en"
languageCode = 'en-US'
weight = 1
title = "Garys World"
# languageDirection = 'rtl' for Right-To-Left languages


[[menu.main]]
name = "About"
url = "/about/"
weight = 1

# this one is always positioned last (ie to the right)
#[[menu.main]]
#name = "Posts"
#url = "/post/"
#weight = 1

[[menu.main]]
name = "Tags"
url = "/tags/"
weight = 1

[[menu.main]]
name = "Contact"
url = "/contact/"
weight = 1


[sitemap]
changefreq = "monthly"
priority = 0.5
filename = "sitemap.xml"

[params]
show_reading_time = true
mainSections = ["post"]
text_color = ""
author = "" # default author, override via `author` in a posts front matter
favicon = ""
site_logo = ""
description = "The last theme you'll ever need. Maybe."
# choose a background color from any on this page: https://tachyons.io/docs/themes/skins/ and preface it with "bg-"
background_color_class = "bg-black"
# choose fitting and alignment styles for the featured image using Tachyons classes such as "cover|contain" for fitting and "bg-top|bg-center|bg-bottom" for alignment, or add any other class space-separated to customize further
featured_image_class = "cover bg-top"
# choose a color dimming class for the page or site header from any on this page: https://tachyons.io/docs/themes/skins/, preface it with "bg-" and add the value such as "-X0" where X is in [1,9]
cover_dimming_class = "bg-black-60"
recent_posts_number = 3

[params.ananke.social.share]
networks = [
  "email",
  "facebook",
  "x-twitter",
  "instagram"
]

[params.ananke.social.follow]
networks = [
  "facebook",
  "x-twitter",
  "instagram",
  "github"
]

[params.ananke.social.facebook]
username = "gary.dohmeier"
# profilelink = "https://www.facebook.com/gary.dohmeier"

[params.ananke.social.linkedin]
username = "garydohmeier"
# https://www.linkedin.com/in/garydohmeier/

[params.ananke.social.x-twitter]
username = "@GaryDohmeier"

[params.ananke.social.instagram]
username = "gerhardtdohmeierii"

[params.ananke.social.github]
username = "gdohmeier"

#[params.ananke.social.networks.wikipedia]
#slug = "wikipedia"
#label = "Wikipedia"
#color = "#0645ad"
#profile = "https://en.wikipedia.org/wiki/%s"
#icon = "wikipedia-w"


[module]
[[module.imports]]
disable = false
ignoreConfig = false
ignoreImports = false
path = 'github.com/theNewDynamic/gohugo-theme-ananke/v2'


[[module.imports]]
  path = 'github.com/hugomods/decap-cms'
[outputs]
  home = ['HTML', 'RSS', 'DecapCMSConfig']
